<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">pg-extension-lab hero</title>
  <desc id="desc">A PostgreSQL extension lab with connected testing, benchmarking, evidence, service boundary, and accelerator modules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1728"/>
      <stop offset="1" stop-color="#07101a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#37a2ff"/>
      <stop offset="1" stop-color="#54f0b7"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1b3553" stroke-opacity="0.45" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <g opacity="0.75" stroke="#2c8cff" stroke-width="3" fill="none" filter="url(#glow)">
    <path d="M600 310L310 165"/>
    <path d="M600 310L305 460"/>
    <path d="M600 310L585 535"/>
    <path d="M600 310L895 160"/>
    <path d="M600 310L930 450"/>
  </g>

  <g transform="translate(500 210)">
    <ellipse cx="100" cy="40" rx="135" ry="38" fill="#102945" stroke="#62b7ff" stroke-width="3"/>
    <rect x="-35" y="40" width="270" height="140" fill="#0b2038" stroke="#62b7ff" stroke-width="3"/>
    <ellipse cx="100" cy="180" rx="135" ry="38" fill="#071827" stroke="#62b7ff" stroke-width="3"/>
    <ellipse cx="100" cy="100" rx="135" ry="38" fill="none" stroke="#2c8cff" stroke-width="2" opacity="0.8"/>
    <text x="100" y="98" text-anchor="middle" fill="#e9f7ff" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700">PG</text>
    <text x="100" y="235" text-anchor="middle" fill="#9ecbff" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">extension lab</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-weight="700">
    <g transform="translate(90 95)">
      <rect width="260" height="140" rx="18" fill="#102238" stroke="#4ca7ff" stroke-width="2"/>
      <text x="28" y="46" fill="#e9f7ff" font-size="28">TDD Ladder</text>
      <text x="28" y="82" fill="#9ecbff" font-size="18" font-weight="500">unit / regress / isolation</text>
      <path d="M32 108l18 18 42-52" stroke="#54f0b7" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M124 108h88M124 128h62" stroke="#4ca7ff" stroke-width="6" stroke-linecap="round"/>
    </g>

    <g transform="translate(90 390)">
      <rect width="285" height="145" rx="18" fill="#102238" stroke="#4ca7ff" stroke-width="2"/>
      <text x="28" y="48" fill="#e9f7ff" font-size="28">Evidence Loop</text>
      <text x="28" y="84" fill="#9ecbff" font-size="18" font-weight="500">hypothesis / artifacts / report</text>
      <rect x="30" y="104" width="56" height="18" rx="5" fill="#2c8cff"/>
      <rect x="96" y="94" width="56" height="28" rx="5" fill="#54f0b7"/>
      <rect x="162" y="76" width="56" height="46" rx="5" fill="#9ecbff"/>
    </g>

    <g transform="translate(450 475)">
      <rect width="300" height="110" rx="18" fill="#102238" stroke="#54f0b7" stroke-width="2"/>
      <text x="28" y="45" fill="#e9f7ff" font-size="27">Pareto Method</text>
      <text x="28" y="78" fill="#9ecbff" font-size="18" font-weight="500">suitability map, not one number</text>
      <path d="M220 82c18-45 36-63 62-69" stroke="#54f0b7" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>

    <g transform="translate(835 80)">
      <rect width="290" height="160" rx="18" fill="#102238" stroke="#4ca7ff" stroke-width="2"/>
      <text x="28" y="48" fill="#e9f7ff" font-size="28">Frontier Bench</text>
      <text x="28" y="84" fill="#9ecbff" font-size="18" font-weight="500">matched recall / pages / cost</text>
      <path d="M42 126c35-65 70-84 112-70s69 10 104-34" stroke="url(#blue)" stroke-width="7" fill="none" stroke-linecap="round"/>
      <g fill="#54f0b7">
        <circle cx="42" cy="126" r="7"/>
        <circle cx="154" cy="56" r="7"/>
        <circle cx="258" cy="22" r="7"/>
      </g>
    </g>

    <g transform="translate(830 390)">
      <rect width="300" height="150" rx="18" fill="#102238" stroke="#54f0b7" stroke-width="2"/>
      <text x="28" y="48" fill="#e9f7ff" font-size="28">Boundary Proof</text>
      <text x="28" y="84" fill="#9ecbff" font-size="18" font-weight="500">API / fixture / environment</text>
      <rect x="34" y="104" width="58" height="28" rx="7" fill="#2c8cff"/>
      <rect x="112" y="104" width="58" height="28" rx="7" fill="#54f0b7"/>
      <rect x="190" y="104" width="58" height="28" rx="7" fill="#9ecbff"/>
    </g>
  </g>
</svg>
