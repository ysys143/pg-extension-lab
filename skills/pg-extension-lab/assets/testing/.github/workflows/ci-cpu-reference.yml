name: cpu-reference

on:
  pull_request:
  push:

jobs:
  pg:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ["15", "16", "17"]
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential postgresql-server-dev-${{ matrix.pg }}
      - name: Build
        run: make
      - name: Regression tests
        run: make installcheck
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres

